<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Server Setup — Tangub City Hardware POS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #1e293b;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 48px;
      width: 460px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #1d4ed8;
      margin-bottom: 6px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    p {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #1d4ed8; }
    .hint {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
      margin-bottom: 24px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1e40af; }
    .error {
      color: #dc2626;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Tangub City Hardware</div>
    <h1>Server Setup</h1>
    <p>Enter the IP address of the server computer that runs the database. Ask your admin if you don't know it.</p>

    <label for="serverIp">Server IP Address</label>
    <input
      id="serverIp"
      type="text"
      placeholder="192.168.1.100"
      value=""
      autofocus
    />
    <div class="hint">Use <strong>localhost</strong> if this computer is also the server.</div>

    <button onclick="save()">Connect & Start</button>
    <div class="error" id="error">Please enter a valid IP address or hostname.</div>
  </div>

  <script>
    function save() {
      const ip = document.getElementById('serverIp').value.trim();
      if (!ip) {
        document.getElementById('error').style.display = 'block';
        return;
      }
      // Send back to Electron main process
      window.__electronSetupResult = ip;
      // Electron exposes this via preload
      if (window.electronSetup) {
        window.electronSetup.submit(ip);
      }
    }

    document.getElementById('serverIp').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') save();
    });

    // Pre-fill with saved IP (if any) so user can just press Enter to continue
    if (window.electronSetup && window.electronSetup.getSavedIp) {
      window.electronSetup.getSavedIp().then((saved) => {
        if (saved) {
          const input = document.getElementById('serverIp');
          input.value = saved;
          input.select();
        }
      });
    }
  </script>
</body>
</html>
